services:
  # Executive Assistant HTTP API
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ea_app
    ports:
      - "8000:8000"
    command: ["uv", "run", "ea", "http"]
    environment:
      # Ollama LLM (use your local or cloud instance)
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      
      # Firecrawl for web search/scraping (self-hosted or cloud)
      # Self-hosted: set FIRECRAWL_BASE_URL (no key needed)
      # Cloud: set FIRECRAWL_API_KEY (get from firecrawl.dev)
      FIRECRAWL_BASE_URL: ${FIRECRAWL_BASE_URL:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}

      # Database (we use SQLite per-user)
      DATA_DIR: /app/data
      
      # App settings
      HOST: "0.0.0.0"
      PORT: "8000"
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  hf_cache:
