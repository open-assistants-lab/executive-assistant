name: Build DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release DMG
    runs-on: macos-14

    env:
      APP_NAME: Executive Assistant
      BUNDLE_ID: com.executiveassistant.flutterApp
      SPARKLE_FEED_URL: ${{ vars.SPARKLE_FEED_URL || 'https://raw.githubusercontent.com/open-assistants-lab/executive-assistant/main/flutter_app/appcast.xml' }}
      SPARKLE_ED_KEY: ${{ secrets.SPARKLE_ED_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install code signing certificate
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p temp temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p temp temp.keychain
          security import /tmp/cert.p12 -k temp.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp temp.keychain
          rm /tmp/cert.p12

      - name: Build Python backend
        run: |
          uv sync
          uv run pyinstaller --clean flutter_app/backend.spec

      - name: Build Flutter macOS app
        run: |
          cd flutter_app
          flutter pub get
          SENTRY_ARGS=""
          if [ -n "$SENTRY_DSN" ]; then
            SENTRY_ARGS="$SENTRY_ARGS --dart-define=sentry_dsn=$SENTRY_DSN"
          fi
          flutter build macos --release $SENTRY_ARGS

      - name: Embed backend in .app bundle
        run: |
          FLUTTER_APP="flutter_app/build/macos/Build/Products/Release/flutter_app.app"
          RESOURCES="$FLUTTER_APP/Contents/Resources"
          mkdir -p "$RESOURCES"
          cp dist/ea "$RESOURCES/ea"
          chmod +x "$RESOURCES/ea"

          APP_BUNDLE="flutter_app/build/macos/Build/Products/Release/$APP_NAME.app"
          if [ "$FLUTTER_APP" != "$APP_BUNDLE" ]; then
            rm -rf "$APP_BUNDLE"
            mv "$FLUTTER_APP" "$APP_BUNDLE"
          fi
          echo "bundle=$APP_BUNDLE" >> $GITHUB_ENV

      - name: Sign the app
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_TEAM_ID" \
            --deep --strict \
            "${{ env.bundle }}"

      - name: Create DMG
        run: |
          mkdir -p flutter_app/build
          DMG_PATH="flutter_app/build/$APP_NAME.dmg"
          rm -f "$DMG_PATH"
          create-dmg \
            --volname "$APP_NAME" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 150 200 \
            --hide-extension "$APP_NAME.app" \
            --app-drop-link 450 200 \
            "$DMG_PATH" \
            "${{ env.bundle }}"
          echo "dmg=$DMG_PATH" >> $GITHUB_ENV

      - name: Sign DMG
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        run: |
          codesign --force --sign "$APPLE_TEAM_ID" "${{ env.dmg }}"

      - name: Notarize DMG
        if: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID != '' }}
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit "${{ env.dmg }}" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ env.dmg }}"

      - name: Generate Sparkle signature
        id: sparkle
        if: ${{ secrets.SPARKLE_ED_KEY != '' }}
        run: |
          if command -v sign_update &>/dev/null; then
            OUTPUT=$(sign_update "${{ env.dmg }}" "$SPARKLE_ED_KEY")
            echo "ed_signature=$(echo "$OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)" >> $GITHUB_OUTPUT
            echo "length=$(stat -f%z "${{ env.dmg }}")" >> $GITHUB_OUTPUT
          else
            echo "warning: sign_update not found"
          fi

      - name: Update appcast.xml
        if: ${{ steps.sparkle.outputs.ed_signature != '' }}
        env:
          ED_SIGNATURE: ${{ steps.sparkle.outputs.ed_signature }}
          DMG_LENGTH: ${{ steps.sparkle.outputs.length }}
          VERSION: ${{ github.ref_name }}
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET, os
          tree = ET.parse('flutter_app/appcast.xml')
          root = tree.getroot()
          ns = {'sparkle': 'http://www.andymatuschak.org/xml-namespaces/sparkle'}
          channel = root.find('channel')
          # Remove existing items
          for item in channel.findall('item'):
            channel.remove(item)
          item = ET.SubElement(channel, 'item')
          title = ET.SubElement(item, 'title')
          title.text = 'Version ${{ github.ref_name }}'
          desc = ET.SubElement(item, 'description')
          desc.text = '${{ github.event.head_commit.message }}'
          pub = ET.SubElement(item, 'pubDate')
          import datetime
          pub.text = datetime.datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S +0000')
          enc = ET.SubElement(item, 'enclosure')
          enc.set('url', 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.APP_NAME }}.dmg')
          enc.set('sparkle:edSignature', os.environ['ED_SIGNATURE'])
          enc.set('sparkle:version', '${{ github.ref_name }}'.lstrip('v'))
          enc.set('sparkle:shortVersionString', '${{ github.ref_name }}'.lstrip('v'))
          enc.set('length', os.environ['DMG_LENGTH'])
          enc.set('type', 'application/octet-stream')
          tree.write('flutter_app/appcast.xml', xml_declaration=True, encoding='utf-8')
          "

      - name: Commit appcast.xml update
        if: ${{ steps.sparkle.outputs.ed_signature != '' }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add flutter_app/appcast.xml
          git commit -m "Update appcast for ${{ github.ref_name }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Executive Assistant ${{ github.ref_name }}

            Download the DMG below, drag to Applications.
          files: ${{ env.dmg }}
          draft: ${{ github.ref_name == '' }}
          generate_release_notes: true