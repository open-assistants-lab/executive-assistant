name: yahoo
display: Yahoo
icon: yahoo
category: social
version: '1.0'
description: Yahoo
auth:
  type: oauth2
  oauth2:
    authorize_url: https://api.login.yahoo.com/oauth2/request_auth
    token_url: https://api.login.yahoo.com/oauth2/get_token
    scopes:
    - read
    token_env_var: YAHOO_ACCESS_TOKEN
  required_fields:
  - name: apidomain
    label: API Domain
    placeholder: fantasysports.yahooapis.com
    input_type: url
    help_text: The domain to the API you want to connect to
    optional: false
setup_guide_url: https://nango.dev/docs/integrations/all/yahoo
tool_source:
  type: mcp
  server_name: yahoo
  command: yahoo-mcp-server
