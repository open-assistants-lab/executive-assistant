name: vtex
display: VTEX
icon: vtex
category: e-commerce
version: '1.0'
description: VTEX
auth:
  type: api_key
  api_key:
    env_var: VTEX_API_KEY
  required_fields:
  - name: apiKey
    label: App Token
    placeholder: ZNWDC************************************LXPNX
    input_type: text
    help_text: The application token associated with your VTEX App Key.
    optional: false
  - name: accountname
    label: Account Name
    placeholder: mystore
    input_type: text
    help_text: Your VTEX store account name.
    optional: false
  - name: appkey
    label: App Key
    placeholder: vtexappkey-mystore-ABCDEF
    input_type: text
    help_text: Your VTEX application key.
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/vtex
tool_source:
  type: mcp
  server_name: vtex
  command: vtex-mcp-server
