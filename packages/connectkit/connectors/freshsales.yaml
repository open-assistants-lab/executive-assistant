name: freshsales
display: Freshsales
icon: freshsal
category: crm
version: '1.0'
description: Freshsales
auth:
  type: api_key
  api_key:
    env_var: FRESHSALES_API_KEY
  required_fields:
  - name: apiKey
    label: API Key
    placeholder: 4oBqA_AzM_G3xbW3TJGvrA
    input_type: text
