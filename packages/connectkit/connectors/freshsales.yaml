  - name: bundlealias
    label: Bundle Alias
    placeholder: acme.myfreshworks.com/crm/sales
    input_type: text
    help_text: The bundle alias for your Freshsales account
    optional: false
  - name: subdomain
    label: ''
    placeholder: ''
    input_type: text
    help_text: ''
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/freshsales
tool_source:
  type: mcp
  server_name: freshsales
  command: freshsales-mcp-server
