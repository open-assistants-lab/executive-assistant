name: pinterest
display: Pinterest
icon: pinteres
category: design
version: '1.0'
description: Pinterest
auth:
  type: oauth2
  oauth2:
    authorize_url: https://www.pinterest.com/oauth
    token_url: https://api.pinterest.com/v5/oauth/token
    scopes:
    - read
    token_env_var: PINTEREST_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/integrations/all/pinterest
tool_source:
  type: mcp
  server_name: pinterest
  command: pinterest-mcp-server
