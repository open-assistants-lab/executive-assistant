name: adobe-commerce
display: Adobe Commerce
icon: adobe
category: e-commerce
version: '1.0'
description: Adobe Commerce
auth:
  type: api_key
  api_key:
    env_var: ADOBE-COMMERCE_API_KEY
  required_fields:
  - name: apiKey
    label: Access Token
    placeholder: 3pgsytnpxbyz0waujkw9qllcjb79s379
    input_type: text
    help_text: Your Adobe Commerce access token
    optional: false
  - name: storedomain
    label: Store Domain
    placeholder: yourstore.com
    input_type: url
    help_text: The domain of your Adobe Commerce store
    optional: false
  - name: storecode
    label: Store Code
    placeholder: default
    input_type: text
    help_text: The store code for your Adobe Commerce store
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/adobe-commerce
tool_source:
  type: mcp
  server_name: adobe-commerce
  command: adobe-commerce-mcp-server
