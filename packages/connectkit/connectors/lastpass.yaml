name: lastpass
display: LastPass
icon: lastpass
category: productivity
version: '1.0'
description: LastPass
auth:
  type: api_key
  api_key:
    env_var: LASTPASS_API_KEY
  required_fields:
  - name: username
    label: CID
    placeholder: ''
    input_type: text
