name: asana
display: Asana
icon: asana
category: productivity
version: '1.0'
description: Asana
auth:
  type: oauth2
  oauth2:
    authorize_url: https://app.asana.com/-/oauth_authorize
    token_url: https://app.asana.com/-/oauth_token
    scopes:
    - default
    token_env_var: ASANA_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/api-integrations/asana/how-to-register-your-own-asana-api-oauth-app
tool_source:
  type: mcp
  server_name: asana
  command: asana-mcp-server
