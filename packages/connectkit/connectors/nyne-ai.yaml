    label: API Key
    placeholder: 48f0****************************892
    input_type: text
    help_text: Your Nyne AI API key.
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/nyne-ai
tool_source:
  type: mcp
  server_name: nyne-ai
  command: nyne-ai-mcp-server
