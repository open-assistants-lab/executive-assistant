name: conta-azul
display: Conta Azul
icon: conta
category: accounting
version: '1.0'
description: Conta Azul
auth:
  type: oauth2
  oauth2:
    authorize_url: https://auth.contaazul.com/login
    token_url: https://auth.contaazul.com/oauth2/token
    scopes:
    - read
    token_env_var: CONTA-AZUL_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/api-integrations/conta-azul/how-to-register-your-own-conta-azul-api-oauth-app
tool_source:
  type: mcp
  server_name: conta-azul
  command: conta-azul-mcp-server
