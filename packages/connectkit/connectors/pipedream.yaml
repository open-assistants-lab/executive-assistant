name: pipedream
display: Pipedream (API Key)
icon: pipedrea
category: dev-tools
version: '1.0'
description: Pipedream (API Key)
auth:
  type: api_key
  api_key:
    env_var: PIPEDREAM_API_KEY
  required_fields:
  - name: apiKey
    label: API Key
    placeholder: 9a1b2c3d4e5f67890abcdeffedcba123
    input_type: text
    help_text: The API Key for your Pipedream account
    optional: false
setup_guide_url: https://nango.dev/docs/integrations/all/pipedream
tool_source:
  type: mcp
  server_name: pipedream
  command: pipedream-mcp-server
