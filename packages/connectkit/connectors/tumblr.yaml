    - read
    token_env_var: TUMBLR_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/integrations/all/tumblr
tool_source:
  type: mcp
  server_name: tumblr
  command: tumblr-mcp-server
