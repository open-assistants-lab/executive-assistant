name: instagram
display: Instagram
icon: instagra
category: marketing
version: '1.0'
description: Instagram
auth:
  type: oauth2
  oauth2:
    authorize_url: https://api.instagram.com/oauth/authorize
    token_url: https://api.instagram.com/oauth/access_token
    scopes:
    - read
    token_env_var: INSTAGRAM_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/api-integrations/instagram/how-to-register-your-own-instagram-api-oauth-app
tool_source:
  type: mcp
  server_name: instagram
  command: instagram-mcp-server
