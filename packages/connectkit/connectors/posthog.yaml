name: posthog
display: PostHog
icon: posthog
category: dev-tools
version: '1.0'
description: PostHog
auth:
  type: api_key
  api_key:
    env_var: POSTHOG_API_KEY
  required_fields:
  - name: apiKey
    label: API Key
    placeholder: phx_1PPf***************************k3D
    input_type: text
    help_text: The API key for your PostHog account
    optional: false
  - name: subdomain
    label: Subdomain
    placeholder: us.i
    input_type: text
    help_text: The subdomain of your PostHog cloud account
    optional: false
tool_sources:
- type: cli
  command: posthog
  install: '# See service docs'
- type: mcp
  server_name: posthog
  command: posthog-mcp-server
setup_guide_url: https://nango.dev/docs/api-integrations/posthog
