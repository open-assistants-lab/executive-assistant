name: atlassian-service-account-api-token
display: Atlassian Service Account (API Token)
icon: atlassia
category: dev-tools
version: '1.0'
description: Atlassian Service Account (API Token)
auth:
  type: api_key
  api_key:
    env_var: ATLASSIAN-SERVICE-ACCOUNT-API-TOKEN_API_KEY
  required_fields:
  - name: username
    label: Service Account Email
    placeholder: bot@serviceaccount.atlassian.com
    input_type: text
    help_text: The email address of your Atlassian service account
    optional: false
  - name: password
    label: API Token
    placeholder: ATSTT3xFfGF07SUw*******************************RvxLUHWs8ZV58TfHI=610694C8
    input_type: password
    help_text: Your Atlassian service account API token
    optional: false
  - name: cloudid
    label: Cloud ID
    placeholder: 12345678-1234-1234-1234-123456789012
    input_type: text
    help_text: Your Atlassian Cloud ID
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/atlassian-service-account-api-token
tool_source:
  type: mcp
  server_name: atlassian-service-account-api-token
  command: atlassian-service-account-api-token-mcp-server
