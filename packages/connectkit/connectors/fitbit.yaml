name: fitbit
display: Fitbit
icon: fitbit
category: sports
version: '1.0'
description: Fitbit
auth:
  type: oauth2
  oauth2:
    authorize_url: https://www.fitbit.com/oauth2/authorize
    token_url: https://api.fitbit.com/oauth2/token
    scopes:
    - read
    token_env_var: FITBIT_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/integrations/all/fitbit
tool_source:
  type: mcp
  server_name: fitbit
  command: fitbit-mcp-server
