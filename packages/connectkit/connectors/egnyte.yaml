name: egnyte
display: Egnyte
icon: egnyte
category: storage
version: '1.0'
description: Egnyte
auth:
  type: oauth2
  oauth2:
    authorize_url: https://${connectionConfig.subdomain}.egnyte.com/puboauth/token
    token_url: https://${connectionConfig.subdomain}.egnyte.com/puboauth/token
    scopes:
    - read
    token_env_var: EGNYTE_ACCESS_TOKEN
  required_fields:
  - name: subdomain
    label: Egnyte Domain
    placeholder: domain
    input_type: text
    help_text: The subdomain of your Egnyte account
    optional: false
setup_guide_url: https://nango.dev/docs/integrations/all/egnyte
tool_source:
  type: mcp
  server_name: egnyte
  command: egnyte-mcp-server
