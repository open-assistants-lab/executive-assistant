name: codeclimate
display: Code Climate
icon: codeclim
category: dev-tools
version: '1.0'
description: Code Climate
auth:
  type: api_key
  api_key:
    env_var: CODECLIMATE_API_KEY
  required_fields:
  - name: apiKey
    label: API Key
    placeholder: ''
    input_type: text
    help_text: The API key for your Code Climate account
    optional: false
  - name: domain
    label: Domain
    placeholder: ''
    input_type: url
    help_text: The domain of your Code Climate account
    optional: false
setup_guide_url: https://nango.dev/docs/integrations/all/codeclimate
tool_source:
  type: mcp
  server_name: codeclimate
  command: codeclimate-mcp-server
