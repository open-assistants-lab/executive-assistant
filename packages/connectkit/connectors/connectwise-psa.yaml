name: connectwise-psa
display: ConnectWise PSA
icon: connectw
category: support
version: '1.0'
description: ConnectWise PSA
auth:
  type: api_key
  api_key:
    env_var: CONNECTWISE-PSA_API_KEY
  required_fields:
  - name: username
    label: Username
    placeholder: ''
    input_type: text
    help_text: The ConnectWise PSA CompanyId followed by either the Public Key, Integrator Username, or MemberId
    optional: false
  - name: password
    label: Password
    placeholder: ''
    input_type: text
    help_text: Your ConnectWise PSA private key, integrator password, or member hash
    optional: false
  - name: hostname
    label: Hostname
    placeholder: api-na.myconnectwise.net
    input_type: url
    help_text: The full ConnectWise PSA hostname.
    optional: false
  - name: subdomain
    label: ''
    placeholder: ''
    input_type: text
    help_text: ''
    optional: false
  - name: apiversion
    label: Api version
    placeholder: ''
    input_type: text
    help_text: The API version to connect to ConnectWise PSA
    optional: false
  - name: clientid
    label: Client ID
    placeholder: ''
    input_type: text
    help_text: The Client ID assigned to your integration
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/connectwise-psa
tool_source:
  type: mcp
  server_name: connectwise-psa
  command: connectwise-psa-mcp-server
