name: booking-com
display: Booking.com
icon: booking
category: e-commerce
version: '1.0'
description: Booking.com
auth:
  type: api_key
  api_key:
    env_var: BOOKING-COM_API_KEY
  required_fields:
  - name: username
    label: Machine Account Username
    placeholder: ''
    input_type: text
    help_text: The username for your Booking.com machine account
    optional: false
  - name: password
    label: Machine Account Password
    placeholder: ''
    input_type: text
    help_text: The password for your Booking.com machine account
    optional: false
  - name: environmenttype
    label: Environment Type
    placeholder: secure-supply|supply
    input_type: text
    help_text: The environment type for your various requests
    optional: false
setup_guide_url: https://nango.dev/docs/integrations/all/booking-com
tool_source:
  type: mcp
  server_name: booking-com
  command: booking-com-mcp-server
