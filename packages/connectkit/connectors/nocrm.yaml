  - name: subdomain
    label: Account subdomain
    placeholder: acme
    input_type: text
    help_text: Your nocrm.io account subdomain
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/nocrm
tool_source:
  type: mcp
  server_name: nocrm
  command: nocrm-mcp-server
