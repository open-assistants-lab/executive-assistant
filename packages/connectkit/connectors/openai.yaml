name: openai
display: OpenAI
icon: openai
category: productivity
version: '1.0'
description: OpenAI
auth:
  type: api_key
  api_key:
    env_var: OPENAI_API_KEY
  required_fields:
  - name: apiKey
    label: API Key
    placeholder: ''
    input_type: text
    help_text: The API key for your OpenAI account
    optional: false
tool_sources:
- type: cli
  command: openai
  install: '# See service docs'
- type: mcp
  server_name: openai
  command: openai-mcp-server
setup_guide_url: https://nango.dev/docs/integrations/all/openai
