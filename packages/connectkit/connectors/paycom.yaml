  - name: password
    label: API Token
    placeholder: ''
    input_type: text
    help_text: The API token of your Paycom account
    optional: false
setup_guide_url: https://nango.dev/docs/integrations/all/paycom
tool_source:
  type: mcp
  server_name: paycom
  command: paycom-mcp-server
