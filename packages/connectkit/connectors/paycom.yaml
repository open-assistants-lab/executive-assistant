name: paycom
display: Paycom
icon: paycom
category: hr
version: '1.0'
description: Paycom
auth:
  type: api_key
  api_key:
    env_var: PAYCOM_API_KEY
  required_fields:
  - name: username
    label: SID
    placeholder: ''
    input_type: text
    help_text: The SID of your Paycom account
