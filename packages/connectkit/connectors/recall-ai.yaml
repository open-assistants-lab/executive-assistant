name: recall-ai
display: Recall.ai
icon: recall
category: dev-tools
version: '1.0'
description: Recall.ai
auth:
  type: api_key
  api_key:
    env_var: RECALL-AI_API_KEY
  required_fields:
  - name: apiKey
    label: API Key
    placeholder: 2d7843e2351dd4afa67eecfb5c723142fcb401b1
