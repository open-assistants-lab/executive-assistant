    optional: false
  - name: region
    label: Region
    placeholder: us-east-1
    input_type: text
    help_text: The region where your Recall.ai account is hosted
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/recall-ai
tool_source:
  type: mcp
  server_name: recall-ai
  command: recall-ai-mcp-server
