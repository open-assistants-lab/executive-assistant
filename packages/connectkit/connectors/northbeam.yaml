name: northbeam
display: Northbeam
icon: northbea
category: analytics
version: '1.0'
description: Northbeam
auth:
  type: api_key
  api_key:
    env_var: NORTHBEAM_API_KEY
  required_fields:
  - name: apiKey
    label: API Key
    placeholder: f1c2d3a4-5b67-4c89-ae01-123456789abc
    input_type: text
    help_text: Your Northbeam API Key.
    optional: false
  - name: subdomain
    label: API Subdomain
    placeholder: api
    input_type: text
    help_text: Use 'api' for production or 'api-uat' for testing/development.
    optional: false
  - name: dataclientid
    label: Data Client ID
    placeholder: 123e4567-e89b-12d3-a456-426614174000
    input_type: text
    help_text: Your Northbeam Data Client ID (UUID).
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/northbeam
tool_source:
  type: mcp
  server_name: northbeam
  command: northbeam-mcp-server
