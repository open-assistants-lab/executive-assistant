name: twitch
display: Twitch
icon: twitch
category: gaming
version: '1.0'
description: Twitch
auth:
  type: oauth2
  oauth2:
    authorize_url: https://id.twitch.tv/oauth2/authorize
    token_url: https://id.twitch.tv/oauth2/token
