    extra_params:
      force_verify: false
    token_env_var: TWITCH_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/integrations/all/twitch
tool_source:
  type: mcp
  server_name: twitch
  command: twitch-mcp-server
