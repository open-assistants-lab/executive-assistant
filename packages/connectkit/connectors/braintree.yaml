name: braintree
display: Braintree
icon: braintre
category: payment
version: '1.0'
description: Braintree
auth:
  type: oauth2
  oauth2:
    authorize_url: https://api.braintreegateway.com/oauth/connect
    token_url: https://api.braintreegateway.com/oauth/access_tokens
    scopes:
    - read
    token_env_var: BRAINTREE_ACCESS_TOKEN
  required_fields: []
tool_sources:
- type: cli
  command: braintree
  install: '# See service docs'
- type: mcp
  server_name: braintree
  command: braintree-mcp-server
setup_guide_url: https://nango.dev/docs/integrations/all/braintree
