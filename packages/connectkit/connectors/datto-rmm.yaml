name: datto-rmm
display: Datto RMM
icon: datto
category: support
version: '1.0'
description: Datto RMM
auth:
  type: oauth2
  oauth2:
    authorize_url: https://${connectionConfig.platform}-api.centrastage.net/auth/oauth/authorize
    token_url: https://${connectionConfig.platform}-api.centrastage.net/auth/oauth/token
    scopes:
    - read
    token_env_var: DATTO-RMM_ACCESS_TOKEN
  required_fields:
  - name: platform
    label: Platform
    placeholder: merlot
    input_type: text
    help_text: The Datto RMM platform (region) for your account
    optional: false
setup_guide_url: https://nango.dev/docs/integrations/all/datto-rmm
tool_source:
  type: mcp
  server_name: datto-rmm
  command: datto-rmm-mcp-server
