    token_env_var: SMUGMUG_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/integrations/all/smugmug
tool_source:
  type: mcp
  server_name: smugmug
  command: smugmug-mcp-server
