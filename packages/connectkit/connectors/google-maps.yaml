    label: API Key
    placeholder: AIzaSyAY4P9A***************1YMSYBI
    input_type: text
    help_text: Your Google Maps API Key.
    optional: false
setup_guide_url: https://nango.dev/docs/api-integrations/google-maps
tool_source:
  type: mcp
  server_name: google-maps
  command: google-maps-mcp-server
