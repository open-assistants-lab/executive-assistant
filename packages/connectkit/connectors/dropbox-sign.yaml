name: dropbox-sign
display: Dropbox Sign
icon: dropbox
category: legal
version: '1.0'
description: Dropbox Sign
auth:
  type: oauth2
  oauth2:
    authorize_url: https://app.hellosign.com/oauth/authorize
    token_url: https://app.hellosign.com/oauth/token
    scopes:
    - read
    token_env_var: DROPBOX-SIGN_ACCESS_TOKEN
  required_fields: []
setup_guide_url: https://nango.dev/docs/integrations/all/dropbox-sign
tool_source:
  type: mcp
  server_name: dropbox-sign
  command: dropbox-sign-mcp-server
